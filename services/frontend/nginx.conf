server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # API same-origin (approccio single-origin): la edge nginx della SPA proxa
  # /ingest al device-gateway. SPA e API condividono l'origin :8090 → niente
  # CORS, niente preflight. Gli header (incluso traceparent) passano all'upstream.
  location = /ingest {
    proxy_pass http://device-gateway:8080/ingest;
    proxy_set_header Host $host;
  }

  # OTLP same-origin: proxa l'export delle tracce del browser (OTel Web) al
  # collector. Così l'export è same-origin (:8090) → niente CORS preflight verso
  # :4318 e nessuna modifica alla config del collector.
  location /v1/ {
    proxy_pass http://otel-collector:4318/v1/;
  }

  # Fallback SPA: i deep-link (es. /history, /callback) gestiti dal router
  # client-side devono restituire index.html invece di 404.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
