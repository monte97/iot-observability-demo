server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # API same-origin (approccio single-origin): la edge nginx della SPA proxa
  # /ingest al device-gateway. SPA e API condividono l'origin :8090 → niente
  # CORS, niente preflight. Gli header (incluso traceparent) passano all'upstream.
  location = /ingest {
    proxy_pass http://device-gateway:8080/ingest;
    proxy_set_header Host $host;
  }

  # OTLP same-origin: proxa l'export delle tracce del browser (OTel Web) al
  # collector. Così l'export è same-origin (:8090) → niente CORS preflight verso
  # :4318 e nessuna modifica alla config del collector.
  location /v1/ {
    proxy_pass http://otel-collector:4318/v1/;
  }

  # Keycloak same-origin: proxa /auth al server Keycloak. È la stessa scelta
  # single-origin applicata all'auth: la POST /token parte same-origin (:8090),
  # così il traceparent del browser viaggia (niente CORS) e lo span server di
  # Keycloak si cuce con la trace. Gli X-Forwarded-* fanno costruire a Keycloak
  # gli URL pubblici corretti (issuer/redirect su :8090/auth).
  location /auth/ {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 8090;
  }

  # Fallback SPA: i deep-link (es. /history, /callback) gestiti dal router
  # client-side devono restituire index.html invece di 404.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
