name: iot-obs-demo

# Lo stack di osservabilità LGTM (otel-collector, tempo, mimir, loki, grafana)
# NON è definito qui: arriva interamente dal kickstart-otel-lgtm (submodule),
# incluso sotto — include risolve i path del kickstart relativi a sé stesso.
# Le dashboard IoT vengono iniettate nella grafana del kickstart tramite
# docker-compose.grafana.yml (override layer; vedi .env -> COMPOSE_FILE).
include:
  - observability/kickstart-otel-lgtm/docker-compose.yml

services:
  kafka:
    image: apache/kafka:3.8.0
    networks: [observability]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  device-gateway:
    build: ./services/device-gateway
    ports: ["8080:8080"]
    depends_on: [kafka, otel-collector, keycloak]
    restart: on-failure
    networks: [observability]
  normalizer:
    build: ./services/normalizer
    depends_on: [kafka, otel-collector]
    restart: on-failure
    networks: [observability]
  mongo:
    image: mongo:7
    networks: [observability]
  store:
    build: ./services/store
    depends_on: [kafka, mongo, otel-collector]
    restart: on-failure
    networks: [observability]
  load-gen:
    image: busybox:1.36
    volumes: ["./services/load-gen/gen.sh:/gen.sh:ro"]
    command: ["sh", "/gen.sh"]
    depends_on: [device-gateway, keycloak]
    networks: [observability]
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Dietro l'edge nginx della SPA, servito sotto /auth (same-origin :8090)
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: http://localhost:8090/auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      # Tracing OTel: parentbased rispetta il traceparent in ingresso dalla POST
      # /token del browser, così lo span server di Keycloak si CUCE con la trace.
      KC_TRACING_ENABLED: "true"
      KC_TRACING_ENDPOINT: http://otel-collector:4317
      KC_TRACING_PROTOCOL: grpc
      KC_TRACING_SAMPLER_TYPE: parentbased_always_on
      KC_TRACING_RESOURCE_ATTRIBUTES: service.name=keycloak
    volumes: ["./keycloak/realm-iot.json:/opt/keycloak/data/import/realm-iot.json:ro"]
    depends_on: [otel-collector]
    networks: [observability]
  frontend:
    build: ./services/frontend
    ports: ["8090:80"]
    depends_on: [keycloak]
    networks: [observability]
