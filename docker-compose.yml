name: iot-obs-demo
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["./otel-collector/config.yaml:/etc/otel/config.yaml:ro"]
    ports: ["4317:4317", "4318:4318"]
    depends_on: [tempo, mimir, loki]
  tempo:
    image: grafana/tempo:2.10.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes: ["./tempo/tempo.yaml:/etc/tempo.yaml:ro"]
  mimir:
    image: grafana/mimir:3.0.0
    command: ["-config.file=/etc/mimir.yaml"]
    volumes: ["./mimir/mimir.yaml:/etc/mimir.yaml:ro"]
  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki.yaml"]
    volumes: ["./loki/loki.yaml:/etc/loki.yaml:ro"]
  grafana:
    image: grafana/grafana:12.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes: ["./grafana/provisioning:/etc/grafana/provisioning:ro"]
    ports: ["3000:3000"]
    depends_on: [tempo, mimir, loki]
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  device-gateway:
    build: ./services/device-gateway
    ports: ["8080:8080"]
    depends_on: [kafka, otel-collector]
    restart: on-failure
  normalizer:
    build: ./services/normalizer
    depends_on: [kafka, otel-collector]
    restart: on-failure
  mongo:
    image: mongo:7
  store:
    build: ./services/store
    depends_on: [kafka, mongo, otel-collector]
    restart: on-failure
  load-gen:
    image: busybox:1.36
    volumes: ["./load-gen/gen.sh:/gen.sh:ro"]
    command: ["sh", "/gen.sh"]
    depends_on: [device-gateway]
  gateway:
    image: nginx:1.27-alpine
    volumes: ["./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro"]
    ports: ["8088:80"]
    depends_on: [device-gateway]
  frontend:
    image: nginx:1.27-alpine
    volumes: ["./frontend:/usr/share/nginx/html:ro"]
    ports: ["8090:80"]
